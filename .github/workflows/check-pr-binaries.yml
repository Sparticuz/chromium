name: Check PR Binaries

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  check:
    name: Check binary status
    runs-on: ubuntu-latest
    steps:
      - name: Check if revision.txt changed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the list of changed files in this PR
          CHANGED=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --paginate --jq '.[].filename' | grep -c '^_/ec2/revision.txt$' || true)

          if [ "$CHANGED" -gt 0 ]; then
            echo "revision_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "revision_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get current labels
        id: labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels \
            --jq '.[].name' | grep '^binaries:' || true)
          echo "current<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LABELS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update labels (revision changed -> binaries:needed)
        if: steps.check.outputs.revision_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CURRENT="${{ steps.labels.outputs.current }}"

          # If binaries are already in progress or complete, don't regress on follow-up pushes
          if echo "$CURRENT" | grep -qxE 'binaries:(available|verified|building|testing)'; then
            echo "binaries already in progress or complete — skipping label update"
            exit 0
          fi

          # Remove all binaries:* labels except binaries:needed
          for LABEL in binaries:available binaries:building binaries:failed binaries:testing binaries:verified binaries:build binaries:test; do
            if echo "$CURRENT" | grep -qx "$LABEL"; then
              gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/${LABEL} \
                -X DELETE || true
            fi
          done

          # Add binaries:needed if not already present
          if ! echo "$CURRENT" | grep -qx 'binaries:needed'; then
            gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/labels \
              -f "labels[]=binaries:needed"
          fi

      - name: Update labels (revision unchanged -> binaries:verified)
        if: steps.check.outputs.revision_changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CURRENT="${{ steps.labels.outputs.current }}"

          # Remove all binaries:* labels except binaries:verified
          for LABEL in binaries:needed binaries:available binaries:building binaries:failed binaries:testing binaries:build binaries:test; do
            if echo "$CURRENT" | grep -qx "$LABEL"; then
              gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/${LABEL} \
                -X DELETE || true
            fi
          done

          # Add binaries:verified if not already present
          if ! echo "$CURRENT" | grep -qx 'binaries:verified'; then
            gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/labels \
              -f "labels[]=binaries:verified"
          fi
