name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 147.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Bump version and tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: master
          # A PAT is required here because pushes from GITHUB_TOKEN do not
          # trigger other workflows. The tag push needs to trigger release.yml.
          # Create a fine-grained PAT with contents:write scope and add it as
          # a repository secret named RELEASE_TOKEN.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qP '^\d+\.\d+\.\d+$'; then
            echo "Invalid version format: ${VERSION}"
            exit 1
          fi

      - name: Check if version already exists
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ inputs.version }} already exists!"
            exit 1
          fi

      - name: Bump version in package.json
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "${{ inputs.version }}"

      - name: Push commit and tag
        run: git push origin master --follow-tags
