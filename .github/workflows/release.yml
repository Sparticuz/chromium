name: Release

on:
  push:
    tags:
      - "*"

permissions:
  id-token: write # Required for OIDC, npm publishing
  contents: write # Required to create releases

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      # Install jq so I can edit package.json from the command line
      - run: sudo apt-get install jq -y

      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      - name: Get chromium revision
        id: revision
        run: |
          REVISION=$(cat _/ec2/revision.txt)
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"

      - name: Download binaries from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          S3_BUCKET: ${{ secrets.CHROMIUM_BUILD_S3_BUCKET }}
          REVISION: ${{ steps.revision.outputs.revision }}
        run: |
          mkdir -p bin/x64 bin/arm64

          # Download all binaries
          aws s3 sync "s3://${S3_BUCKET}/${REVISION}/x64/" bin/x64/ --exclude "*.json" --exclude "*.png"
          aws s3 sync "s3://${S3_BUCKET}/${REVISION}/arm64/" bin/arm64/ --exclude "*.json"  --exclude "*.png"
          aws s3 cp "s3://${S3_BUCKET}/${REVISION}/fonts.tar.br" bin/fonts.tar.br || true

          # Verify critical files exist
          for f in bin/x64/chromium.br bin/arm64/chromium.br; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing required file: $f"
              exit 1
            fi
          done

      - name: Verify binary checksums
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          S3_BUCKET: ${{ secrets.CHROMIUM_BUILD_S3_BUCKET }}
          REVISION: ${{ steps.revision.outputs.revision }}
        run: |
          set -euo pipefail

          # Download manifest (contains SHA-256 checksums from build time)
          aws s3 cp "s3://${S3_BUCKET}/${REVISION}/manifest.json" /tmp/manifest.json

          echo "Verifying binary checksums against manifest..."
          FAILED=0

          verify() {
            local FILE="$1" JQ_PATH="$2"
            if [ ! -f "$FILE" ]; then
              echo "SKIP: $FILE not found"
              return
            fi
            EXPECTED=$(jq -r "$JQ_PATH" /tmp/manifest.json)
            if [ "$EXPECTED" = "null" ] || [ -z "$EXPECTED" ]; then
              echo "WARN: No checksum in manifest for $FILE"
              return
            fi
            ACTUAL=$(sha256sum "$FILE" | cut -d' ' -f1)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "FAIL: $FILE"
              echo "  expected: $EXPECTED"
              echo "  actual:   $ACTUAL"
              FAILED=1
            else
              echo "OK: $FILE ($ACTUAL)"
            fi
          }

          verify bin/x64/chromium.br       '.x64.binaries["chromium.br"].sha256'
          verify bin/x64/swiftshader.tar.br '.x64.binaries["swiftshader.tar.br"].sha256'
          verify bin/x64/al2023.tar.br      '.x64.binaries["al2023.tar.br"].sha256'
          verify bin/arm64/chromium.br       '.arm64.binaries["chromium.br"].sha256'
          verify bin/arm64/swiftshader.tar.br '.arm64.binaries["swiftshader.tar.br"].sha256'
          verify bin/arm64/al2023.tar.br     '.arm64.binaries["al2023.tar.br"].sha256'
          verify bin/fonts.tar.br            '.fonts["fonts.tar.br"].sha256'

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Checksum verification failed — aborting release"
            exit 1
          fi
          echo "All checksums verified successfully"

      - run: npm run build

      - name: Copy x64 binaries to bin
        run: cp -R bin/x64/* bin

      - name: Release chromium on npmjs
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Cleanup bin after npm publish
        run: rm -f bin/chromium.br bin/swiftshader.tar.br

      - name: Create Lambda Layer (x64)
        run: make chromium-${{ github.ref_name }}-layer.x64.zip

      - name: Create Lambda Layer (arm64)
        run: make chromium-${{ github.ref_name }}-layer.arm64.zip

      # Change the package name to chromium-min,
      # delete the bin folder from the files array
      # so that it doesn't publish the binaries to -min
      - name: Cleanup and prepare for chromium-min
        run: |
          jq '.name="@sparticuz/chromium-min"' package.json > .package.json
          jq 'del(.files[] | select(. == "bin" or . == "!bin/arm64" or . == "!bin/x64"))' .package.json > package.json
          jq '.homepage="https://github.com/Sparticuz/chromium#-min-package"' package.json > .package.json
          mv .package.json package.json
          rm package-lock.json
          npm install

      - name: Release chromium-min on npmjs
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Create Chromium (x64) Pack
        run: |
          npm run pack:x64
          mv chromium-pack.x64.tar chromium-${{ github.ref_name }}-pack.x64.tar

      - name: Create Chromium (arm64) Pack
        run: |
          npm run pack:arm64
          mv chromium-pack.arm64.tar chromium-${{ github.ref_name }}-pack.arm64.tar

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > /tmp/release-notes.md <<EOF
          # [@sparticuz/chromium ${TAG}](https://www.npmjs.com/package/@sparticuz/chromium), [@sparticuz/chromium-min ${TAG}](https://www.npmjs.com/package/@sparticuz/chromium-min)
          The \`chromium-${TAG}-layer.ARCH.zip\` file may be uploaded directly as a layer in AWS Lambda using the following code
          \`\`\`
          bucketName="chromiumUploadBucket" && archType="x64" && \\
          aws s3 cp chromium-${TAG}-layer.\${archType}.zip "s3://\${bucketName}/chromiumLayers/chromium-${TAG}-layer.\${archType}.zip" && \\
          aws lambda publish-layer-version --layer-name chromium --description "Chromium ${TAG}" --content "S3Bucket=\${bucketName},S3Key=chromiumLayers/chromium-${TAG}-layer.\${archType}.zip" --compatible-runtimes "nodejs20.x" "nodejs22.x" --compatible-architectures \$(if [ "\$archType" = "x64" ]; then echo "x86_64"; else echo "\$archType"; fi)
          \`\`\`
          The \`chromium-${TAG}-pack.ARCH.tar\` file may be uploaded to any https endpoint and the remote location may be used as the \`input\` variable in the \`chromium.executablePath(input)\` function.

          Support this project's continued development by becoming a [monthly sponsor on GitHub](https://github.com/sponsors/Sparticuz). Your contribution helps cover monthly maintenance costs and ensures ongoing improvements.
          EOF

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "${TAG}" \
            --draft \
            --generate-notes \
            --notes-file /tmp/release-notes.md \
            "chromium-${TAG}-layer.x64.zip" \
            "chromium-${TAG}-layer.arm64.zip" \
            "chromium-${TAG}-pack.x64.tar" \
            "chromium-${TAG}-pack.arm64.tar"
